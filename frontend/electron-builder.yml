appId: com.cloudtravelguide.app
productName: Cloud Travel Guide
copyright: Copyright © 2026 Cloud Travel Guide

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - build/electron/**/*
  - package.json
  - "!**/node_modules/@img/**"
  - "!**/node_modules/sharp/**"

extraMetadata:
  main: build/electron/main.js

asar: true

mac:
  category: public.app-category.travel
  target:
    - target: dmg
      arch: arm64

win:
  signAndEditExecutable: false
  target:
    - nsis
    - portable

linux:
  target:
    - AppImage
    - deb
  maintainer: gabriel lin <2823283465@qq.com>
